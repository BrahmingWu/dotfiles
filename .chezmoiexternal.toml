[".config/ghostty/shaders"]
  type = "archive"
  url = "https://github.com/KroneCorylus/ghostty-shader-playground/archive/master.tar.gz"
  include = ["**/shaders/**"]
  stripComponents = 3
  refreshPeriod = "168h"

[".local/ChromeExtensions/Surge"]
  type = "archive"
  url = "https://github.com/SurgeDM/Surge/archive/main.tar.gz"
  include = ["**/extension-chrome/**"]
  stripComponents = 2
  refreshPeriod = "168h"
